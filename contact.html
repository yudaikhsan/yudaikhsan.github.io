<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Yudha Ikhsan</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ð</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="nav-overlay" id="navOverlay" onclick="closeDrawer()"></div>
  <nav class="nav-drawer" id="navDrawer">
    <ul>
      <li><a href="index.html" onclick="closeDrawer()">Home</a></li>
      <li><a href="posts.html" onclick="closeDrawer()">Posts</a></li>
      <li><a href="research.html" onclick="closeDrawer()">Research</a></li>
      <li><a href="projects.html" onclick="closeDrawer()">Projects</a></li>
      <li><a href="cv.html" onclick="closeDrawer()">CV</a></li>
      <li><a href="index.html#contact" onclick="closeDrawer()">Contact</a></li>
    </ul>
  </nav>
  <header class="navbar">
    <button class="hamburger" id="hamburgerBtn" onclick="toggleDrawer()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="navbar-brand">YUDHA IKHSAN</a>
  </header>
  <div class="page-header" style="background:var(--bg-alt)">
    <div class="container"><h1>Contact</h1></div>
  </div>
  <section>
    <div class="container">
      <div class="contact-wrapper">
        <div class="contact-info">
          <p>City, Country</p>
          <p><a href="mailto:yourname@university.edu">yourname@university.edu</a></p>
          <p>Department Name, University Name</p>
        </div>
        <div class="social-links" style="justify-content:flex-start;margin-bottom:2rem">
          <a href="https://linkedin.com/in/yourprofile" target="_blank" rel="noopener" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
          <a href="https://x.com/yourhandle" target="_blank" rel="noopener" title="X / Twitter"><i class="fab fa-twitter"></i></a>
          <a href="https://github.com/yudaikhsan" target="_blank" rel="noopener" title="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://substack.com/@yourhandle" target="_blank" rel="noopener" title="Substack"><i class="fas fa-rss"></i></a>
        </div>
        <div class="contact-form">
          <form>
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Your message..."></textarea>
            </div>
            <button type="submit">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>
  <footer>
    <p>&copy; <span id="year"></span> Yudha Ikhsan &nbsp;&middot;&nbsp; <a href="index.html">Home</a> &nbsp;&middot;&nbsp; <a href="contact.html">Contact</a></p>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function toggleDrawer() {
      document.getElementById('navDrawer').classList.toggle('open');
      document.getElementById('navOverlay').classList.toggle('open');
      document.getElementById('hamburgerBtn').classList.toggle('open');
    }
    function closeDrawer() {
      document.getElementById('navDrawer').classList.remove('open');
      document.getElementById('navOverlay').classList.remove('open');
      document.getElementById('hamburgerBtn').classList.remove('open');
    }
    document.addEventListener('keydown', function(e) { if(e.key==='Escape') closeDrawer(); });
  </script>
</body>
</html>
