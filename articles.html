<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar on Fire</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <!-- Site title -->
        <div class="site-title">Scholar on Fire</div>

        <!-- Profile -->
        <div class="profile">
            <img src="https://via.placeholder.com/150" alt="Profile Photo">
            <h2>Your Name</h2>
            <p>Web Developer & Researcher</p>
        </div>

        <!-- Social Links -->
        <div class="social-links">
            <a href="https://github.com/yourusername" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/in/yourprofile" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://twitter.com/yourhandle" target="_blank" aria-label="X"><i class="fab fa-twitter"></i></a>
            <a href="https://bsky.app/profile/yourhandle.bsky.social" target="_blank" class="bluesky" aria-label="Bluesky"></a>
        </div>

        <!-- Contact -->
        <div class="contact-info">
            <p><i class="fas fa-phone"></i> +62 812-3456-7890</p>
            <p><i class="fas fa-envelope"></i> your.email@example.com</p>
        </div>

        <!-- Articles -->
        <a href="articles.html" class="nav-section-title">
            <i class="fas fa-file-alt"></i> Articles
        </a>

        <!-- Research -->
        <a href="research.html" class="nav-section-title">
            <i class="fas fa-flask"></i> Research
        </a>

        <!-- Projects -->
        <a href="projects.html" class="nav-section-title">
            <i class="fas fa-code"></i> Projects
        </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <h1>Welcome to Scholar on Fire</h1>
        <p>This is your personal portfolio. Explore articles, research, and projects using the sidebar navigation.</p>
    </main>

</html>
